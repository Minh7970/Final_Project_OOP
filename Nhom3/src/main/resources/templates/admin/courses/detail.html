<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết khóa học - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1e1b4b,#312e81);position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
        .sidebar-brand h5{color:#fff;font-weight:700;margin:0;}
        .sidebar-brand small{color:#a5b4fc;font-size:.75rem;}
        .sidebar .nav-link{color:#c7d2fe;padding:.65rem 1.2rem;border-radius:8px;margin:2px 8px;font-size:.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;margin-right:8px;}
        .sidebar-section{color:#818cf8;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:1rem 1.4rem .3rem;}
        .main-content{margin-left:260px;min-height:100vh;}
        .topbar{background:#fff;padding:.75rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .content-area{padding:1.5rem;}
        .card{border:none;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
        .form-select{border-radius:8px;border-color:#e2e8f0;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-mortarboard-fill me-2"></i>OOP-PTIT</h5>
        <small>👑 Quản trị viên</small>
    </div>
    <nav class="nav flex-column pt-2">
        <span class="sidebar-section">Tổng quan</span>
        <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <span class="sidebar-section">Quản lý</span>
        <a class="nav-link" href="/admin/students"><i class="bi bi-people"></i>Học sinh</a>
        <a class="nav-link" href="/admin/teachers"><i class="bi bi-person-workspace"></i>Giáo viên</a>
        <a class="nav-link active" href="/admin/courses"><i class="bi bi-journal-bookmark"></i>Khóa học</a>
        <span class="sidebar-section">Tài khoản</span>
        <a class="nav-link" href="/admin/users/create"><i class="bi bi-person-plus"></i>Tạo tài khoản</a>
        <div style="position:absolute;bottom:1rem;width:100%;">
            <form th:action="@{/logout}" method="post" style="margin:0 8px;">
                <button type="submit" class="btn w-100 text-start nav-link" style="color:#f87171;">
                    <i class="bi bi-box-arrow-left"></i>Đăng xuất
                </button>
            </form>
        </div>
    </nav>
</div>
<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-2">
            <a href="/admin/courses" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
            <h6 class="mb-0 fw-bold" th:text="${course.title}">Khóa học</h6>
        </div>
        <form th:action="@{/admin/courses/{id}/status(id=${course.id})}" method="post" class="d-flex gap-2 align-items-center">
            <select name="status" class="form-select form-select-sm" style="width:140px;">
                <option value="ACTIVE" th:selected="${course.status.name() == 'ACTIVE'}">✓ Hoạt động</option>
                <option value="INACTIVE" th:selected="${course.status.name() == 'INACTIVE'}">✗ Ẩn</option>
                <option value="DRAFT" th:selected="${course.status.name() == 'DRAFT'}">📝 Nháp</option>
            </select>
            <button type="submit" class="btn btn-sm btn-primary">Lưu</button>
        </form>
    </div>
    <div class="content-area">
        <div class="row g-3">
            <div class="col-lg-4">
                <div class="card p-4">
                    <div class="text-center mb-3" style="font-size:4rem;">📚</div>
                    <h5 class="fw-bold text-center" th:text="${course.title}">Tên khóa học</h5>
                    <p class="text-muted small text-center" th:text="${course.description}">Mô tả</p>
                    <hr>
                    <div class="d-flex justify-content-between small mb-2">
                        <span class="text-muted">Giáo viên</span>
                        <span class="fw-semibold" th:text="${course.teacher.fullName}">GV</span>
                    </div>
                    <div class="d-flex justify-content-between small mb-2">
                        <span class="text-muted">Học sinh</span>
                        <span class="fw-semibold" th:text="${course.studentCount} + '/' + ${course.maxStudents}">0</span>
                    </div>
                    <div class="d-flex justify-content-between small mb-2">
                        <span class="text-muted">Bài học</span>
                        <span class="fw-semibold" th:text="${course.lessonCount}">0</span>
                    </div>
                    <div class="d-flex justify-content-between small">
                        <span class="text-muted">Ngày tạo</span>
                        <span th:text="${#temporals.format(course.createdAt, 'dd/MM/yyyy')}">-</span>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-3">
                    <h6 class="fw-bold mb-3">📋 Danh sách bài học</h6>
                    <div th:if="${#lists.isEmpty(course.lessons)}" class="text-center py-3 text-muted">
                        <i class="bi bi-journal-x d-block fs-3 mb-1"></i>Chưa có bài học
                    </div>
                    <div th:each="lesson, stat : ${course.lessons}" class="d-flex align-items-center gap-3 p-2 rounded mb-1" style="background:#f8fafc;">
                        <div class="text-white rounded d-flex align-items-center justify-content-center fw-bold"
                             style="width:32px;height:32px;background:#4f46e5;font-size:.8rem;"
                             th:text="${stat.index + 1}">1</div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold small" th:text="${lesson.title}">Bài học</div>
                            <div class="text-muted" style="font-size:.75rem;" th:text="${lesson.durationMinutes != null} ? ${lesson.durationMinutes} + ' phút' : ''"></div>
                        </div>
                        <span th:if="${lesson.status.name() == 'PUBLISHED'}" class="badge bg-success">Published</span>
                        <span th:if="${lesson.status.name() == 'DRAFT'}" class="badge bg-warning text-dark">Draft</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
