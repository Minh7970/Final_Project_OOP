<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Giáo viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#064e3b,#065f46);position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
        .sidebar-brand h5{color:#fff;font-weight:700;margin:0;}
        .sidebar-brand small{color:#a7f3d0;font-size:.75rem;}
        .sidebar .nav-link{color:#d1fae5;padding:.65rem 1.2rem;border-radius:8px;margin:2px 8px;font-size:.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;margin-right:8px;}
        .sidebar-section{color:#6ee7b7;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:1rem 1.4rem .3rem;}
        .main-content{margin-left:260px;min-height:100vh;}
        .topbar{background:#fff;padding:.75rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .content-area{padding:1.5rem;}
        .stat-card{border:none;border-radius:12px;transition:transform .2s;}
        .stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.1);}
        .course-card{background:#fff;border:none;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:transform .2s;}
        .course-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);}
        .course-thumb{height:120px;border-radius:12px 12px 0 0;background:linear-gradient(135deg,#059669,#10b981);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
        .avatar{width:36px;height:36px;border-radius:50%;background:#059669;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;}
        .btn-success{background:#059669;border-color:#059669;border-radius:8px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-mortarboard-fill me-2"></i>OOP-PTIT</h5>
        <small>👨‍🏫 Giáo viên</small>
    </div>
    <nav class="nav flex-column pt-2">
        <span class="sidebar-section">Tổng quan</span>
        <a class="nav-link active" href="/teacher/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <span class="sidebar-section">Quản lý</span>
        <a class="nav-link" href="/teacher/courses"><i class="bi bi-journal-bookmark"></i>Khóa học của tôi</a>
        <a class="nav-link" href="/teacher/courses/create"><i class="bi bi-plus-circle"></i>Tạo khóa học mới</a>
        <span class="sidebar-section">Học sinh</span>
        <a class="nav-link" href="/teacher/students"><i class="bi bi-people"></i>Danh sách học sinh</a>
        <a class="nav-link" href="/teacher/students/create"><i class="bi bi-person-plus"></i>Thêm học sinh</a>
        <div style="position:absolute;bottom:1rem;width:100%;">
            <form th:action="@{/logout}" method="post" style="margin:0 8px;">
                <button type="submit" class="btn w-100 text-start nav-link" style="color:#fca5a5;">
                    <i class="bi bi-box-arrow-left"></i>Đăng xuất
                </button>
            </form>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="topbar">
        <h6 class="mb-0 fw-bold">📊 Dashboard Giáo viên</h6>
        <div class="d-flex align-items-center gap-2">
            <div class="avatar"><i class="bi bi-person-fill"></i></div>
            <span class="fw-semibold small" sec:authentication="name">Teacher</span>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#dcfce7;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-journal-bookmark-fill text-success" style="font-size:1.4rem;"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Khóa học</div>
                            <div class="fw-bold fs-4" th:text="${totalCourses}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#dbeafe;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-people-fill text-primary" style="font-size:1.4rem;"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Tổng học sinh</div>
                            <div class="fw-bold fs-4" th:text="${totalStudents}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#fef3c7;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-plus-circle-fill text-warning" style="font-size:1.4rem;"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Tạo mới</div>
                            <a href="/teacher/courses/create" class="btn btn-sm btn-success mt-1">+ Khóa học</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0">📚 Khóa học của tôi</h6>
            <a href="/teacher/courses" class="btn btn-sm btn-outline-success">Xem tất cả</a>
        </div>
        <div class="row g-3">
            <div class="col-md-4" th:each="course : ${courses}" th:if="${courseStat.index < 6}">
                <div class="course-card">
                    <div class="course-thumb">📚</div>
                    <div class="p-3">
                        <h6 class="fw-bold mb-1 text-truncate" th:text="${course.title}">Khóa học</h6>
                        <div class="d-flex justify-content-between text-muted small mb-2">
                            <span><i class="bi bi-people me-1"></i><span th:text="${course.studentCount}">0</span> HS</span>
                            <span><i class="bi bi-journals me-1"></i><span th:text="${course.lessonCount}">0</span> bài</span>
                        </div>
                        <a th:href="@{/teacher/courses/{id}(id=${course.id})}"
                           class="btn btn-sm btn-outline-success w-100">Quản lý</a>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(courses)}" class="col-12 text-center py-4 text-muted">
                <i class="bi bi-journal-plus fs-1 d-block mb-2"></i>
                Chưa có khóa học. <a href="/teacher/courses/create">Tạo ngay!</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
