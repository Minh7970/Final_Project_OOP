<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .error-card{background:#fff;border-radius:20px;padding:3rem;text-align:center;max-width:450px;box-shadow:0 10px 40px rgba(0,0,0,.1);}
        .error-code{font-size:4rem;font-weight:800;color:#f59e0b;line-height:1;}
    </style>
</head>
<body>
<div class="error-card">
    <div style="font-size:5rem;">🔍</div>
    <div class="error-code">404</div>
    <h4 class="fw-bold mt-2 mb-1" th:text="${errorTitle ?: 'Không tìm thấy trang'}">404</h4>
    <p class="text-muted" th:text="${errorMessage ?: 'Trang bạn tìm kiếm không tồn tại.'}">Mô tả</p>
    <a href="javascript:history.back()" class="btn btn-primary me-2">← Quay lại</a>
</div>
</body>
</html>
