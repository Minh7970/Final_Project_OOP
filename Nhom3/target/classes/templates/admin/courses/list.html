<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khóa học - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1e1b4b,#312e81);position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
        .sidebar-brand h5{color:#fff;font-weight:700;margin:0;}
        .sidebar-brand small{color:#a5b4fc;font-size:.75rem;}
        .sidebar .nav-link{color:#c7d2fe;padding:.65rem 1.2rem;border-radius:8px;margin:2px 8px;font-size:.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;margin-right:8px;}
        .sidebar-section{color:#818cf8;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:1rem 1.4rem .3rem;}
        .main-content{margin-left:260px;min-height:100vh;}
        .topbar{background:#fff;padding:.75rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .content-area{padding:1.5rem;}
        .course-card{background:#fff;border:none;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:transform .2s,box-shadow .2s;}
        .course-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);}
        .course-thumb{height:140px;border-radius:12px 12px 0 0;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:3rem;}
        .form-control,.form-select{border-radius:8px;border-color:#e2e8f0;}
        .form-control:focus,.form-select:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1);}
        .btn-primary{background:#4f46e5;border-color:#4f46e5;border-radius:8px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-mortarboard-fill me-2"></i>OOP-PTIT</h5>
        <small>👑 Quản trị viên</small>
    </div>
    <nav class="nav flex-column pt-2">
        <span class="sidebar-section">Tổng quan</span>
        <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <span class="sidebar-section">Quản lý</span>
        <a class="nav-link" href="/admin/students"><i class="bi bi-people"></i>Học sinh</a>
        <a class="nav-link" href="/admin/teachers"><i class="bi bi-person-workspace"></i>Giáo viên</a>
        <a class="nav-link active" href="/admin/courses"><i class="bi bi-journal-bookmark"></i>Khóa học</a>
        <span class="sidebar-section">Tài khoản</span>
        <a class="nav-link" href="/admin/users/create"><i class="bi bi-person-plus"></i>Tạo tài khoản</a>
        <div style="position:absolute;bottom:1rem;width:100%;">
            <form th:action="@{/logout}" method="post" style="margin:0 8px;">
                <button type="submit" class="btn w-100 text-start nav-link" style="color:#f87171;">
                    <i class="bi bi-box-arrow-left"></i>Đăng xuất
                </button>
            </form>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="topbar">
        <h6 class="mb-0 fw-bold">📚 Quản lý khóa học</h6>
    </div>
    <div class="content-area">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search -->
        <div class="bg-white rounded-3 p-3 mb-3 shadow-sm">
            <form action="/admin/courses" method="get" class="d-flex gap-2">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm khóa học..."
                       th:value="${keyword}" style="max-width:350px;">
                <button type="submit" class="btn btn-primary px-3"><i class="bi bi-search"></i></button>
                <a href="/admin/courses" class="btn btn-outline-secondary px-3"><i class="bi bi-x"></i></a>
            </form>
        </div>

        <!-- Course Grid -->
        <div class="row g-3">
            <div class="col-md-4 col-lg-3" th:each="course : ${courses}">
                <div class="course-card">
                    <div class="course-thumb">📚</div>
                    <div class="p-3">
                        <h6 class="fw-bold mb-1 text-truncate" th:text="${course.title}">Tên khóa học</h6>
                        <div class="text-muted small mb-2">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${course.teacher.fullName}">GV</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="small text-muted">
                                <i class="bi bi-people me-1"></i>
                                <span th:text="${course.studentCount}">0</span> HS
                            </span>
                            <span class="small text-muted">
                                <i class="bi bi-journals me-1"></i>
                                <span th:text="${course.lessonCount}">0</span> bài
                            </span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span th:switch="${course.status.name()}">
                                <span th:case="'ACTIVE'" class="badge bg-success">Hoạt động</span>
                                <span th:case="'INACTIVE'" class="badge bg-secondary">Ẩn</span>
                                <span th:case="'DRAFT'" class="badge bg-warning text-dark">Nháp</span>
                            </span>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/courses/{id}(id=${course.id})}"
                                   class="btn btn-sm btn-outline-info"><i class="bi bi-eye"></i></a>
                                <form th:action="@{/admin/courses/{id}/delete(id=${course.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Bạn có chắc muốn xóa khóa học này?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(courses)}" class="col-12">
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-journal-x fs-1 d-block mb-2"></i>Chưa có khóa học nào
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
