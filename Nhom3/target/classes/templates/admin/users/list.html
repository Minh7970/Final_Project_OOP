<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${roleLabel} + ' - Admin'">Danh sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1e1b4b,#312e81);position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
        .sidebar-brand h5{color:#fff;font-weight:700;margin:0;}
        .sidebar-brand small{color:#a5b4fc;font-size:.75rem;}
        .sidebar .nav-link{color:#c7d2fe;padding:.65rem 1.2rem;border-radius:8px;margin:2px 8px;font-size:.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;margin-right:8px;}
        .sidebar-section{color:#818cf8;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:1rem 1.4rem .3rem;}
        .main-content{margin-left:260px;min-height:100vh;}
        .topbar{background:#fff;padding:.75rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .content-area{padding:1.5rem;}
        .table-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
        .table thead th{background:#f8fafc;border:none;font-size:.8rem;font-weight:600;color:#64748b;text-transform:uppercase;}
        .table tbody td{border-color:#f1f5f9;vertical-align:middle;}
        .avatar{width:36px;height:36px;border-radius:50%;background:#4f46e5;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;}
        .form-control,.form-select{border-radius:8px;border-color:#e2e8f0;}
        .form-control:focus,.form-select:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1);}
        .btn-primary{background:#4f46e5;border-color:#4f46e5;border-radius:8px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-mortarboard-fill me-2"></i>OOP-PTIT</h5>
        <small>👑 Quản trị viên</small>
    </div>
    <nav class="nav flex-column pt-2">
        <span class="sidebar-section">Tổng quan</span>
        <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <span class="sidebar-section">Quản lý</span>
        <a class="nav-link" th:classappend="${role == 'STUDENT'} ? 'active'" href="/admin/students"><i class="bi bi-people"></i>Học sinh</a>
        <a class="nav-link" th:classappend="${role == 'TEACHER'} ? 'active'" href="/admin/teachers"><i class="bi bi-person-workspace"></i>Giáo viên</a>
        <a class="nav-link" href="/admin/courses"><i class="bi bi-journal-bookmark"></i>Khóa học</a>
        <span class="sidebar-section">Tài khoản</span>
        <a class="nav-link" href="/admin/users/create"><i class="bi bi-person-plus"></i>Tạo tài khoản</a>
        <div style="position:absolute;bottom:1rem;width:100%;">
            <form th:action="@{/logout}" method="post" style="margin:0 8px;">
                <button type="submit" class="btn w-100 text-start nav-link" style="color:#f87171;">
                    <i class="bi bi-box-arrow-left"></i>Đăng xuất
                </button>
            </form>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="topbar">
        <h6 class="mb-0 fw-bold" th:text="'📋 Danh sách ' + ${roleLabel}">Danh sách</h6>
        <div class="d-flex align-items-center gap-2">
            <div class="avatar">A</div>
            <span class="fw-semibold small" sec:authentication="name">Admin</span>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="table-card p-3">
            <!-- Toolbar -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <form th:action="${role == 'STUDENT'} ? '/admin/students' : '/admin/teachers'"
                      method="get" class="d-flex gap-2">
                    <input type="text" name="keyword" class="form-control" style="width:280px;"
                           placeholder="Tìm theo tên, username, email..."
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-primary px-3">
                        <i class="bi bi-search"></i>
                    </button>
                    <a th:href="${role == 'STUDENT'} ? '/admin/students' : '/admin/teachers'"
                       class="btn btn-outline-secondary px-3">
                        <i class="bi bi-x"></i>
                    </a>
                </form>
                <a href="/admin/users/create" class="btn btn-primary">
                    <i class="bi bi-person-plus me-1"></i>Thêm mới
                </a>
            </div>

            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Họ tên</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Điện thoại</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, stat : ${users}">
                    <td class="text-muted small" th:text="${stat.index + 1}">1</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar"
                                 th:style="${role == 'TEACHER'} ? 'background:#059669;width:34px;height:34px;font-size:.8rem;' : 'width:34px;height:34px;font-size:.8rem;'"
                                 th:text="${#strings.substring(user.fullName,0,1)}">N</div>
                            <div>
                                <div class="fw-semibold small" th:text="${user.fullName}">Họ tên</div>
                                <div class="text-muted" style="font-size:.75rem;" th:text="${user.email}">email</div>
                            </div>
                        </div>
                    </td>
                    <td><code th:text="${user.username}">username</code></td>
                    <td class="small text-muted" th:text="${user.email}">email</td>
                    <td class="small" th:text="${user.phone ?: '-'}">-</td>
                    <td>
                        <span th:if="${user.enabled}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${user.enabled}" class="badge bg-secondary">Vô hiệu</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/admin/users/{id}(id=${user.id})}"
                               class="btn btn-sm btn-outline-info" title="Xem">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                               class="btn btn-sm btn-outline-warning" title="Sửa">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa"
                                        onclick="return confirm('Bạn có chắc muốn xóa tài khoản này?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                        <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                        Không tìm thấy kết quả nào
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="mt-2 text-muted small" th:if="${!#lists.isEmpty(users)}">
                Tổng: <strong th:text="${#lists.size(users)}">0</strong> người dùng
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
