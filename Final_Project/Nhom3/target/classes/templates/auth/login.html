<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - OOP-PTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff; border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            overflow: hidden; width: 100%; max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 2rem; text-align: center;
        }
        .login-header h4 { color: #fff; font-weight: 700; margin: 0.5rem 0 0; }
        .login-header p { color: #c4b5fd; margin: 0; font-size: 0.9rem; }
        .login-body { padding: 2rem; }
        .form-control {
            border-radius: 10px; border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem; font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .input-group-text {
            border-radius: 10px 0 0 10px; border: 2px solid #e2e8f0;
            border-right: none; background: #f8fafc; color: #64748b;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
        .btn-login {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none; border-radius: 10px; padding: 0.75rem;
            font-weight: 600; font-size: 1rem; color: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79,70,229,0.4);
            color: #fff;
        }
        .demo-accounts { background: #f8fafc; border-radius: 10px; padding: 1rem; }
        .demo-accounts h6 { color: #64748b; font-size: 0.8rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; }
        .demo-item { display: flex; justify-content: space-between;
            font-size: 0.82rem; padding: 3px 0; color: #475569; }
        .demo-item span:last-child { color: #4f46e5; font-weight: 500; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div style="font-size:3rem;">🎓</div>
        <h4>OOP-PTIT</h4>
        <p>Hệ thống quản lý môn Lập trình Hướng đối tượng</p>
    </div>
    <div class="login-body">

        <!-- Thông báo lỗi -->
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center mb-3" style="border-radius:10px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <!-- Thông báo thành công -->
        <div th:if="${successMsg}" class="alert alert-success d-flex align-items-center mb-3" style="border-radius:10px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMsg}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary small">TÊN ĐĂNG NHẬP</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Nhập username..." required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary small">MẬT KHẨU</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Nhập mật khẩu..." required>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
            </button>
        </form>

        <hr class="my-3">

        <div class="text-center small text-muted mb-3">
            Chưa có tài khoản?
            <a href="/register" class="text-primary fw-semibold text-decoration-none">Đăng ký ngay</a>
        </div>

        <div class="demo-accounts">
            <h6><i class="bi bi-info-circle me-1"></i>Tài khoản demo</h6>
            <div class="demo-item"><span>👑 Admin</span><span>admin / Admin@123</span></div>
            <div class="demo-item"><span>👨‍🏫 Giáo viên</span><span>teacher01 / Teacher@123</span></div>
            <div class="demo-item"><span>👨‍🎓 Học sinh</span><span>student01 / Student@123</span></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
