<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f1f5f9;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1e1b4b,#312e81);position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
        .sidebar-brand h5{color:#fff;font-weight:700;margin:0;}
        .sidebar-brand small{color:#a5b4fc;font-size:.75rem;}
        .sidebar .nav-link{color:#c7d2fe;padding:.65rem 1.2rem;border-radius:8px;margin:2px 8px;font-size:.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;margin-right:8px;}
        .sidebar-section{color:#818cf8;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:1rem 1.4rem .3rem;}
        .main-content{margin-left:260px;min-height:100vh;}
        .topbar{background:#fff;padding:.75rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .content-area{padding:1.5rem;}
        .form-control,.form-select{border-radius:8px;border-color:#e2e8f0;padding:.65rem 1rem;}
        .form-control:focus,.form-select:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1);}
        .btn-primary{background:#4f46e5;border-color:#4f46e5;border-radius:8px;}
        .btn-primary:hover{background:#3730a3;border-color:#3730a3;}
        .card{border:none;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
        .role-card{border:2px solid #e2e8f0;border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s;}
        .role-card:hover{border-color:#4f46e5;background:#f5f3ff;}
        .role-card.selected{border-color:#4f46e5;background:#f5f3ff;}
        .form-check-input:checked{background-color:#4f46e5;border-color:#4f46e5;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-mortarboard-fill me-2"></i>OOP-PTIT</h5>
        <small>👑 Quản trị viên</small>
    </div>
    <nav class="nav flex-column pt-2">
        <span class="sidebar-section">Tổng quan</span>
        <a class="nav-link" href="/admin/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <span class="sidebar-section">Quản lý</span>
        <a class="nav-link" href="/admin/students"><i class="bi bi-people"></i>Học sinh</a>
        <a class="nav-link" href="/admin/teachers"><i class="bi bi-person-workspace"></i>Giáo viên</a>
        <a class="nav-link" href="/admin/courses"><i class="bi bi-journal-bookmark"></i>Khóa học</a>
        <span class="sidebar-section">Tài khoản</span>
        <a class="nav-link active" href="/admin/users/create"><i class="bi bi-person-plus"></i>Tạo tài khoản</a>
        <div style="position:absolute;bottom:1rem;width:100%;">
            <form th:action="@{/logout}" method="post" style="margin:0 8px;">
                <button type="submit" class="btn w-100 text-start nav-link" style="color:#f87171;">
                    <i class="bi bi-box-arrow-left"></i>Đăng xuất
                </button>
            </form>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-2">
            <a href="/admin/dashboard" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h6 class="mb-0 fw-bold">➕ Tạo tài khoản mới</h6>
        </div>
    </div>

    <div class="content-area">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card p-4">
                    <div th:if="${errorMsg}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                    </div>

                    <form th:action="@{/admin/users/create}" method="post" th:object="${userForm}">

                        <!-- VAI TRÒ -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Vai trò <span class="text-danger">*</span></label>
                            <div class="row g-2">
                                <div class="col-4">
                                    <label class="role-card text-center d-block" id="card-ADMIN">
                                        <input type="radio" th:field="*{role}" value="ADMIN" class="d-none" onchange="selectRole(this)">
                                        <div style="font-size:1.8rem;">👑</div>
                                        <div class="fw-semibold small">Admin</div>
                                    </label>
                                </div>
                                <div class="col-4">
                                    <label class="role-card text-center d-block" id="card-TEACHER">
                                        <input type="radio" th:field="*{role}" value="TEACHER" class="d-none" onchange="selectRole(this)">
                                        <div style="font-size:1.8rem;">👨‍🏫</div>
                                        <div class="fw-semibold small">Giáo viên</div>
                                    </label>
                                </div>
                                <div class="col-4">
                                    <label class="role-card text-center d-block" id="card-STUDENT">
                                        <input type="radio" th:field="*{role}" value="STUDENT" class="d-none" onchange="selectRole(this)">
                                        <div style="font-size:1.8rem;">👨‍🎓</div>
                                        <div class="fw-semibold small">Học sinh</div>
                                    </label>
                                </div>
                            </div>
                            <div th:if="${#fields.hasErrors('role')}" class="text-danger small mt-1"
                                 th:errors="*{role}"></div>
                        </div>

                        <div class="row g-3">
                            <!-- HỌ TÊN -->
                            <div class="col-12">
                                <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Nhập họ và tên đầy đủ...">
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>

                            <!-- USERNAME -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="vd: nguyen_van_a">
                                <div class="invalid-feedback" th:errors="*{username}"></div>
                            </div>

                            <!-- MẬT KHẨU -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Ít nhất 6 ký tự...">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>

                            <!-- EMAIL -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="email@example.com">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>

                            <!-- SỐ ĐIỆN THOẠI -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control"
                                       placeholder="0901234567">
                            </div>

                            <!-- ĐỊA CHỈ -->
                            <div class="col-12">
                                <label class="form-label fw-semibold">Địa chỉ</label>
                                <input type="text" th:field="*{address}" class="form-control"
                                       placeholder="Địa chỉ...">
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-lg me-1"></i>Tạo tài khoản
                            </button>
                            <a href="/admin/dashboard" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function selectRole(radio) {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + radio.value).classList.add('selected');
}
// Restore selection on page load
document.querySelectorAll('input[name="role"]').forEach(r => {
    if (r.checked) selectRole(r);
});
</script>
</body>
</html>
